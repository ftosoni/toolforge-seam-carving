name: Deploy to Toolforge

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Run only after CI checks pass (optional, but recommended if we make them part of same workflow.
    # Since they are separate files, we can just run it on push)
    steps:
    - name: SSH and Trigger Toolforge Deployment
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: login.toolforge.org
        username: supnabla
        key: ${{ secrets.TOOLFORGE_SSH_KEY }}
        # Runs the deploy commands directly under the tool account
        script: |
          become seam-carving toolforge webservice buildservice stop --mount=all
          become seam-carving toolforge build clean -y
          become seam-carving toolforge build start https://github.com/ftosoni/toolforge-seam-carving
          become seam-carving toolforge webservice buildservice start --mount=all -m 6Gi
